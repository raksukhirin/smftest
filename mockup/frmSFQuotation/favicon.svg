<?xml version="1.0" encoding="UTF-8"?>
<!--
  SMF Next favicon — angular "S" mark with cyan→navy gradient.
  Drawn as a thick stroked path that traces an "S" with miter corners,
  echoing the angular ribbon style of the master brand mark.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="SMF Next">
    <defs>
        <linearGradient id="smfG" x1="50%" y1="0%" x2="50%" y2="100%">
            <stop offset="0%"   stop-color="#3fc4ff"/>
            <stop offset="45%"  stop-color="#1e72d6"/>
            <stop offset="100%" stop-color="#0a2658"/>
        </linearGradient>
    </defs>
    <!-- The "S": top-right → top-left → bottom-right (diagonal) → bottom-left.
         Thick stroke with miter joins gives the angular "ribbon" feel. -->
    <path
        fill="none"
        stroke="url(#smfG)"
        stroke-width="13"
        stroke-linejoin="miter"
        stroke-linecap="butt"
        stroke-miterlimit="2.5"
        d="M 52 12 L 12 12 L 52 52 L 12 52"
    />
</svg>
