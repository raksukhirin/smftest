<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- TODO: เปลี่ยน title -->
    <title>YourForm Mockup — Module Template</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 text-slate-800">

    <!-- ===== Top bar ===== -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30">
        <div class="max-w-[1400px] mx-auto px-6 py-3 flex items-center gap-4">
            <div class="flex items-center gap-2">
                <!-- TODO: เปลี่ยน letter + bg-color ของ logo -->
                <div class="w-8 h-8 rounded-lg bg-indigo-600 text-white flex items-center justify-center font-bold">F</div>
                <div>
                    <div class="text-xs uppercase tracking-wider text-slate-500">SMP Module</div>
                    <!-- TODO: เปลี่ยน name -->
                    <div class="font-semibold text-sm leading-none">Your Form Title</div>
                </div>
            </div>

            <!-- Search -->
            <div class="flex-1 max-w-md ml-4 relative">
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">⌕</span>
                    <input id="searchInput" type="text" placeholder="Search…" autocomplete="off"
                           class="w-full pl-9 pr-3 py-2 text-sm bg-slate-100 rounded-lg border border-transparent focus:bg-white focus:border-indigo-500 focus:outline-none">
                </div>
                <div id="searchDropdown" class="hidden absolute top-full left-0 right-0 mt-1 bg-white border border-slate-200 rounded-lg shadow-lg z-40 max-h-80 overflow-y-auto"></div>
            </div>

            <!-- Nav arrows -->
            <nav class="flex items-center gap-1 text-sm">
                <button class="nav-btn" id="navFirst" title="First">«</button>
                <button class="nav-btn" id="navPrev"  title="Previous">‹</button>
                <span class="text-xs text-slate-500 px-2 tabular-nums" id="navCounter">1 / 1</span>
                <button class="nav-btn" id="navNext"  title="Next">›</button>
                <button class="nav-btn" id="navLast"  title="Last">»</button>
            </nav>

            <div class="flex items-center gap-2 ml-auto">
                <button class="btn-secondary" id="newBtn" title="New">+ New</button>
                <button class="btn-ghost" title="Reset to seed data" id="resetSeedBtn">↺</button>
                <button class="btn-primary" id="saveBtn">Save</button>
            </div>
        </div>
    </header>

    <!-- ===== Read-only banner (auto-shown when DocStat = Approved/Deleted) ===== -->
    <div id="readonlyBanner" class="readonly-banner">🔒 <span id="readonlyText">This document is locked.</span></div>

    <!-- ===== Banner ===== -->
    <section class="bg-white border-b border-slate-200">
        <div class="max-w-[1400px] mx-auto px-6 py-4 flex flex-wrap items-center gap-x-8 gap-y-3">
            <div>
                <div class="text-xs uppercase tracking-wider text-slate-500">Doc Number</div>
                <div class="flex items-center gap-2 mt-0.5">
                    <span class="text-lg font-bold text-indigo-700 tabular-nums" id="bannerDocNo">—</span>
                    <span class="status-pill status-open" id="statusPill">● Open</span>
                    <span class="text-xs text-amber-600 font-semibold ml-1 hidden" id="dirtyFlag" title="Unsaved changes">● Unsaved</span>
                </div>
            </div>
            <div class="border-l border-slate-200 pl-8">
                <div class="text-xs uppercase tracking-wider text-slate-500">Date</div>
                <div class="text-sm font-medium mt-0.5" id="bannerDocDate">—</div>
            </div>
            <div class="ml-auto text-xs text-slate-500">
                <span id="lastModified">—</span>
            </div>
        </div>
    </section>

    <!-- ===== Main content ===== -->
    <main class="max-w-[1400px] mx-auto px-6 py-6 pb-32 space-y-6">

        <!-- TODO: เพิ่ม section card ตาม fields ของ form -->
        <section class="card">
            <div class="card-head">
                <h2 class="card-title">📄 Document Info</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="field">
                    <label class="label required">Doc Number</label>
                    <input class="input font-mono" name="DocNo">
                </div>
                <div class="field">
                    <label class="label">Doc Date</label>
                    <input type="date" class="input" name="DocDate">
                </div>
                <div class="field">
                    <label class="label">Status</label>
                    <select class="input" name="DocStat">
                        <option>Open</option>
                        <option>Approved</option>
                        <option>Close</option>
                        <option>Deleted</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- TODO: เพิ่ม section อื่น ๆ (Customer, Sales, Cargo, etc.) -->

        <!-- ===== Detail grid example ===== -->
        <section class="card">
            <div class="card-head flex-wrap gap-3">
                <h2 class="card-title">📋 Detail Rows</h2>
                <div class="flex flex-wrap gap-2 ml-auto">
                    <button type="button" class="btn-secondary text-xs" id="addDetailBtn">+ Add Row</button>
                    <button type="button" class="btn-ghost text-xs text-red-600" id="clearDetailBtn">Clear All</button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm" id="detailTable">
                    <thead>
                        <tr class="text-left text-xs uppercase tracking-wider text-slate-500 bg-slate-50 border-y">
                            <th class="px-2 py-2 w-8">#</th>
                            <th class="px-2 py-2">Description</th>
                            <th class="px-2 py-2 text-right w-24">Qty</th>
                            <th class="px-2 py-2 text-right w-24">Price</th>
                            <th class="px-2 py-2 text-right w-24">Total</th>
                            <th class="px-2 py-2 w-10"></th>
                        </tr>
                    </thead>
                    <tbody id="detailTbody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- ===== Sticky bottom action bar ===== -->
    <footer class="fixed bottom-0 inset-x-0 bg-white border-t border-slate-200 shadow-lg z-30">
        <div class="max-w-[1400px] mx-auto px-6 py-3 flex flex-wrap items-center gap-2">
            <button class="btn-danger" id="deleteBtn">🗑 Delete</button>

            <div class="hidden md:flex items-center text-xs text-slate-500 mx-4">
                <span class="text-slate-400 mr-2">Last modified:</span>
                <span id="footerEditInfo">—</span>
            </div>

            <div class="ml-auto flex items-center gap-2">
                <button class="btn-primary" id="saveBtn2">💾 Save</button>
            </div>
        </div>
    </footer>

    <!-- ===== Toast ===== -->
    <div id="toast" class="fixed bottom-24 right-6 z-50 hidden">
        <div class="bg-slate-900 text-white px-4 py-3 rounded-lg shadow-lg text-sm flex items-center gap-2">
            <span id="toastIcon">✓</span>
            <span id="toastMsg">Saved</span>
        </div>
    </div>

    <!-- ===== Confirm dialog ===== -->
    <div id="dialog" class="fixed inset-0 z-50 bg-slate-900/50 hidden items-center justify-center">
        <div class="bg-white rounded-lg shadow-lg w-full max-w-md p-5" onclick="event.stopPropagation()">
            <h3 id="dlgTitle" class="font-semibold text-lg mb-2"></h3>
            <p id="dlgMsg" class="text-sm text-slate-600 mb-5"></p>
            <div class="flex justify-end gap-2">
                <button id="dlgCancel" class="btn-secondary">Cancel</button>
                <button id="dlgConfirm" class="btn-primary">OK</button>
            </div>
        </div>
    </div>

    <!-- ===== Error summary modal (mirrors frm `frmSYShowErr`) ===== -->
    <div id="errorModal" class="fixed inset-0 z-50 bg-slate-900/50 hidden items-center justify-center">
        <div class="bg-white rounded-lg shadow-lg w-full max-w-lg p-5" onclick="event.stopPropagation()">
            <h3 class="font-semibold text-lg mb-2 text-red-700">⚠ Cannot save — please fix the following</h3>
            <p class="text-sm text-slate-600 mb-2"><span id="errCount">0</span> validation issue(s) found:</p>
            <ul id="errorList" class="error-modal-list"></ul>
            <div class="flex justify-end">
                <button id="errOk" class="btn-primary">OK</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
